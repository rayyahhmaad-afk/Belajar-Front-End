<!DOCTYPE html>
<html>
<head>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background: #6C63FF;
            margin: 50px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
            transform-origin: center;
        }

        .box:hover {
            transform: translate(20px, -10px) rotate(15deg) scale(1.1);
        }
    </style>
</head>
<body>

    <div class="box">Transform</div>

</body>
</html>
