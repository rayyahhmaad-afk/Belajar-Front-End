<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Warna.css">
    <style>
        .box{
            width: 200px;
            height: 200px;
            margin: 10px;
            padding: 10px;
            border: 2px solid black;
            border-radius: 10px;
        }
        .box1{
            background-color: red;
        }
        .box2{
            background-color: blue;
        }
        .box3{
            background-color: yellow;
        }
        .box4{
            background-color: green;
        }
        .box5{
            background-color: purple;
        }
        .gradient {
            background: linear-gradient(to right, rgb(199, 70, 70), blue);
        }
    </style>
</head>
<body>
    <h1>Penggunaan Warna</h1>

    <div class="box box1">
        <h3>box-red</h3>
    </div>
    <div class="box box2">
        <h3>box-blue</h3>
    </div>
    <div class="box box3">
        <h3>box-yellow</h3>
    </div>
    <div class="box box4">
        <h3>box-green</h3>
    </div>
    <div class="box box5">
        <h3>box-purple</h3>
    </div>
</body>
</html>
