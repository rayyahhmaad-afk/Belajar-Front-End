<!DOCTYPE html>
<html>
<head>
    <style>
        .gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            gap: 1rem;
            width: 300px;
        }

        .gallery-item {
            flex: 0 0 100%;
            height: 150px;
            background: #6C63FF;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            scroll-snap-align: center;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="gallery-item">Slide 1</div>
        <div class="gallery-item" style="background: #3F3D56;">Slide 2</div>
        <div class="gallery-item" style="background: #FF6584;">Slide 3</div>
    </div>

</body>
</html>
