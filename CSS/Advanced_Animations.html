<!DOCTYPE html>
<html>
<head>
    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6C63FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #333;
            font-family: monospace;
            font-size: 1.2rem;
            animation: typing 3s steps(20);
        }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <div class="typing">Belajar CSS Animasi...</div>

</body>
</html>
