<!DOCTYPE html>
<html>
<head>
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .element {
            width: 150px;
            height: 50px;
            background: #6C63FF;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .pulse-box {
            width: 100px;
            height: 100px;
            background: #FF6584;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="element">Fade In Up</div>
    <div class="pulse-box"></div>

</body>
</html>
