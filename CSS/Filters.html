<!DOCTYPE html>
<html>
<head>
    <style>
        .image {
            width: 200px;
            filter: grayscale(100%) brightness(0.8) drop-shadow(5px 5px 10px rgba(0,0,0,0.3));
        }

        .container {
            position: relative;
            background: red;
            width: 200px;
            height: 100px;
        }

        .overlay {
            width: 100%;
            height: 100%;
            background: blue;
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>

    <img src="https://via.placeholder.com/200" alt="Demo" class="image">

    <div class="container">
        <div class="overlay"></div>
    </div>

</body>
</html>
