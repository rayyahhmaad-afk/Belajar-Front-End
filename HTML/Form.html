<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="">Nama Lengkap</label>
        <input type="text" placeholder="Masukkan Nama Anda">
        <br>
        <label for="">Email</label>
        <input type="email" placeholder="Masukkan Email Anda">
        <br>
        <label for="">Password</label>
        <input type="password" placeholder="Masukkan Password Anda">
        <br>
        <label for="">Nomor Telepon</label>
        <input type="number" placeholder="Masukkan Nomor Telepon Anda">
        <br>
        <label for="">Alamat</label>
        <input type="text" placeholder="Masukkan Alamat Anda">
        <br>
        <label for="">Jenis Kelamin</label>
        <input type="radio" name="jenis_kelamin" id="jenis_kelamin">
        <br>
        <label for="">Hobi</label>
        <input type="checkbox" name="hobi" id="hobi">
        <br>
        <label for="">Pesan</label>
        <textarea name="pesan" id="pesan" cols="30" rows="10"></textarea>
        <br>
        <input type="submit" value="Kirim">
    </form>
</body>
</html>
